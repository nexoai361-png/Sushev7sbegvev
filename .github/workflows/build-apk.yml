name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build Web Application
        run: npm run build

      - name: Generate Capacitor Assets (Icons & Splash)
        run: npm run assets:generate

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Sync Web Assets to Android Project
        run: npx cap sync android

      - name: Fix and Regenerate Gradle Wrapper Jar
        run: |
          cd android
          echo "Verifying gradle-wrapper.jar..."
          mkdir -p gradle/wrapper
          # Remove corrupt jar if it exists
          rm -f gradle/wrapper/gradle-wrapper.jar
          # Download a fresh jar from the official Gradle repository (raw)
          curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.2.1/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          if ! jar tf gradle/wrapper/gradle-wrapper.jar > /dev/null 2>&1; then
             echo "Download failed or jar still corrupt. Trying to use system gradle..."
             gradle wrapper --gradle-version 8.2.1 || echo "System gradle not found, build might fail."
          else
             echo "gradle-wrapper.jar successfully restored."
          fi
          chmod +x gradlew

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ReversX-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
