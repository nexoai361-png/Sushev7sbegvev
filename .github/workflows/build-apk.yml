name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Application
        run: npm run build

      - name: Generate Capacitor Assets (Icons & Splash)
        run: npm run assets:generate

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Sync Web Assets to Android Project
        run: npx cap sync android

      - name: Fix and Regenerate Gradle Wrapper Jar
        run: |
          cd android
          echo "Restoring clean gradle-wrapper.jar from official Gradle release..."
          mkdir -p gradle/wrapper
          curl -sL https://github.com/gradle/gradle/raw/v8.14.3/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          if ! jar tf gradle/wrapper/gradle-wrapper.jar > /dev/null 2>&1; then
            echo "Downloaded jar is corrupt or failed to download. Regenerating using installed gradle..."
            gradle wrapper --gradle-version 8.14.3
          else
            echo "Valid gradle-wrapper.jar successfully restored."
          fi

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ReversX-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
